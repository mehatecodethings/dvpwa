name: DevSecOps Pipeline

on: [push, pull_request]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_DB: dvpwa
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        # ADD health check so postgres is truly ready before app starts
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:latest
        ports:
          - 6379:6379
        # ADD health check so redis is truly ready before app starts
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --prefer-binary -r requirements.txt

      - name: Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          generateSarif: "true"

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=mehatecodethings_dvpwa
            -Dsonar.organization=mehatecodethings

      - name: Snyk Security Scan
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      - name: Grant permissions to workspace
        run: chmod -R 777 ${{ github.workspace }}

      - name: Start Application
        env:
          DB_HOST: 127.0.0.1
          REDIS_HOST: 127.0.0.1
        run: |
          python run.py > app_logs.txt 2>&1 &
          APP_PID=$!
          echo "App PID: $APP_PID"

          echo "Waiting for app to be ready..."
          APP_READY=false
          for i in {1..30}; do
            sleep 5
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8080 || true)
            echo "Attempt $i: HTTP status = $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "302" ] || [ "$HTTP_CODE" = "301" ]; then
              echo "App is up and responding!"
              APP_READY=true
              break
            else
              echo "App not ready yet. Recent logs:"
              tail -n 5 app_logs.txt
            fi
          done

          # If app never came up, print full logs and fail clearly
          if [ "$APP_READY" = "false" ]; then
            echo "ERROR: App failed to start after 150 seconds. Full logs:"
            cat app_logs.txt
            exit 1
          fi

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:8080'
          # IMPORTANT: Do not fail the pipeline just because ZAP found vulnerabilities
          # (dvpwa is intentionally vulnerable — exit code 3 = alerts found, which is expected)
          fail_action: false
          allow_issue_alerts: true
        env:
          DOCKER_RUN_OPTIONS: "-u root -v ${{ github.workspace }}:/zap/wrk/:rw --network=host"
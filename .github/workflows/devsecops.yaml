name: DevSecOps Pipeline

on: [push, pull_request]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_DB: dvpwa
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
      redis:
        image: redis:latest
        ports:
          - 6379:6379
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --prefer-binary -r requirements.txt

      - name: Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          generateSarif: "true"

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=mehatecodethings_dvpwa
            -Dsonar.organization=mehatecodethings

      - name: Snyk Security Scan
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      - name: Grant permissions to workspace
        run: chmod -R 777 ${{ github.workspace }}

      - name: Test Database Connection
        run: |
          nc -zv localhost 5432 || echo "Postgres not reachable on localhost"
      
      - name: Start Application
        env:
          DB_HOST: localhost
        run: |
          python run.py &
          for i in {1..30}; do
            curl -s http://localhost:8080 > /dev/null && break
            echo "Waiting for app to start..."
            sleep 2
          done

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:8080'
        env:
          DOCKER_RUN_OPTIONS: "-u root -v ${{ github.workspace }}:/zap/wrk/:rw --network=host"
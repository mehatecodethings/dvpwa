name: DevSecOps Pipeline

on: [push, pull_request]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_DB: dvpwa
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install system tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq redis-tools postgresql-client

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --prefer-binary -r requirements.txt

      - name: Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          generateSarif: "true"

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=mehatecodethings_dvpwa
            -Dsonar.organization=mehatecodethings

      - name: Snyk Security Scan
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      - name: Grant permissions to workspace
        run: chmod -R 777 ${{ github.workspace }}

      - name: Wait for PostgreSQL
        run: |
          echo "Waiting for PostgreSQL..."
          for i in {1..20}; do
            if pg_isready -h 127.0.0.1 -p 5432 -U user; then
              echo "PostgreSQL is ready!"
              break
            fi
            echo "Attempt $i: not ready yet..."
            sleep 3
          done

      - name: Run Database Migrations
        run: |
          export PGPASSWORD=password
          echo "Running migrations..."
          for f in $(ls migrations/*.sql | sort); do
            echo "Applying $f..."
            psql -h 127.0.0.1 -p 5432 -U user -d dvpwa -f "$f"
          done
          echo "All migrations applied!"

      - name: Wait for Redis
        run: |
          echo "Waiting for Redis..."
          for i in {1..20}; do
            if redis-cli -h 127.0.0.1 -p 6379 ping | grep -q PONG; then
              echo "Redis is ready!"
              break
            fi
            echo "Attempt $i: not ready yet..."
            sleep 3
          done

      - name: Start Application
        env:
          DB_HOST: 127.0.0.1
          REDIS_HOST: 127.0.0.1
        run: |
          sed -i '/^app:/,/^[^ ]/ s/host: 127.0.0.1/host: 0.0.0.0/' config/dev.yaml
          echo "Config after patch:"
          cat config/dev.yaml

          python run.py > app_logs.txt 2>&1 &
          APP_PID=$!
          echo "App PID: $APP_PID"

          echo "Waiting for app HTTP server to be ready..."
          APP_READY=false
          for i in {1..30}; do
            sleep 5
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              --connect-timeout 3 \
              --max-time 5 \
              http://127.0.0.1:8080 || true)
            echo "Attempt $i: HTTP status = $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "302" ] || [ "$HTTP_CODE" = "301" ]; then
              echo "App is up!"
              APP_READY=true
              break
            else
              tail -n 5 app_logs.txt
            fi
          done

          if [ "$APP_READY" = "false" ]; then
            echo "Full app logs:"
            cat app_logs.txt
            exit 1
          fi

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:8080'
          fail_action: false
          allow_issue_alerts: true
        env:
          DOCKER_RUN_OPTIONS: "-u root -v ${{ github.workspace }}:/zap/wrk/:rw --network=host"